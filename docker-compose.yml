version: '3.9'

services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: keystone-db
    environment:
      POSTGRES_DB: keystone_db
      POSTGRES_USER: keystone_user
      POSTGRES_PASSWORD: keystone_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keystone_user -d keystone_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Spring Boot Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./keystone-backend
      dockerfile: Dockerfile
    container_name: keystone-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_USERNAME: keystone_user
      DB_PASSWORD: keystone_pass
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/keystone_db
      JWT_SECRET: a2V5c3RvbmUtc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seS0yNTZiaXRz
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./keystone-frontend
      dockerfile: Dockerfile
    container_name: keystone-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
