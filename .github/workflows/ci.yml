name: KEYSTONE CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keystone-backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: keystone_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/keystone_test
          DB_USERNAME: test_user
          DB_PASSWORD: test_pass
          JWT_SECRET: dGVzdC1zZWNyZXQta2V5LWZvci1jaS1waXBlbGluZS0yNTZiaXRz

      - name: Build JAR
        run: mvn package -DskipTests -B

  # ── Frontend Build ───────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keystone-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: keystone-frontend/package-lock.json
      - run: npm ci
      - run: npm run build